name: Publish to ClawHub
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ClawHub CLI
        run: npm install -g clawhub
        
      - name: Check version and Publish
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # 1. Login to ClawHub
          clawhub login --token "$CLAWHUB_TOKEN"
          
          # 2. Get local version from _meta.json
          LOCAL_VERSION=$(jq -r '.version' _meta.json)
          echo "Local version in repo: $LOCAL_VERSION"
          
          # 3. Get published version from ClawHub registry (fallback to 0.0.0 if not found)
          PUBLISHED_VERSION=$(clawhub inspect avanza-investment-tracker --json | jq -r '.version' 2>/dev/null || echo "0.0.0")
          echo "Latest published version: $PUBLISHED_VERSION"
          
          # 4. Compare versions
          IS_NEWER=$(python3 -c "
          import sys
          def parse(v):
              # Strip potential 'v' prefix and split by '.'
              parts = v.lstrip('v').split('.')
              # Filter out any non-numeric suffixes (e.g. 2.0.3-alpha -> 2.0.3)
              numeric_parts = []
              for p in parts:
                  num = ''.join(c for c in p if c.isdigit())
                  numeric_parts.append(int(num) if num else 0)
              return tuple(numeric_parts)
          local_v = parse('$LOCAL_VERSION')
          pub_v = parse('$PUBLISHED_VERSION')
          print(local_v > pub_v)
          ")
          
          if [ "$IS_NEWER" = "True" ]; then
            echo "Newer version detected. Publishing $LOCAL_VERSION to ClawHub..."
            clawhub publish .
          else
            echo "Version $LOCAL_VERSION already exists on ClawHub registry (latest: $PUBLISHED_VERSION). Skipping publish."
          fi
