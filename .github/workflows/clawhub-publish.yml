name: Publish to ClawHub
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags to allow diffing

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Inject Git Tag Version into _meta.json
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" =~ ^v[0-9] ]]; then
            VERSION="${REF_NAME#v}"
            echo "Injecting tag version $VERSION into _meta.json"
            jq --arg ver "$VERSION" '.version = $ver' _meta.json > temp.json && mv temp.json _meta.json
          else
            echo "Not triggered by a version tag (ref: $REF_NAME). Keeping version from _meta.json."
          fi

      - name: Generate Changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          if [[ "$CURRENT_TAG" =~ ^v[0-9] ]]; then
            PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
            if [ -z "$PREV_TAG" ]; then
              echo "No previous tag found. Generating changelog from beginning of history."
              git log "${CURRENT_TAG}" --format="- %s" > changelog.txt
            else
              echo "Generating changelog between $PREV_TAG and $CURRENT_TAG."
              git log "${PREV_TAG}..${CURRENT_TAG}" --format="- %s" > changelog.txt
            fi
          else
            echo "Not a tag release. Generating changelog from last 5 commits."
            git log -n 5 --format="- %s" > changelog.txt
          fi

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token "$CLAWHUB_TOKEN"
          SLUG=$(jq -r '.slug' _meta.json)
          VERSION=$(jq -r '.version' _meta.json)
          CHANGELOG=$(cat changelog.txt)
          clawhub publish . --slug "$SLUG" --version "$VERSION" --changelog "$CHANGELOG"
